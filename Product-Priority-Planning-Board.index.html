<body><header><h1><i class="ti ti-table" aria-hidden="true" style="font-size:19px"></i> Project Board</h1><div class="header-actions"><div style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;padding:4px 8px;border:0.5px solid var(--border);border-radius:5px;background:var(--surface2)" title="Changes are shared with your team in real time"><span id="sync-dot" style="width:7px;height:7px;border-radius:50%;background:var(--text3);display:inline-block;transition:background .3s"></span><span id="sync-label">Live</span></div><div class="settings-wrap"><button class="btn sm" onclick="toggleSettings()"><i class="ti ti-settings" aria-hidden="true"></i> Jira</button><div class="settings-pop" id="settings-pop"><div style="font-size:18px;font-weight:600;margin-bottom:10px;color:var(--text)">Jira settings</div><div class="form-group" style="margin-bottom:10px"><label>Base URL</label><input type="text" id="jira-url" placeholder="https://dlapiperuk.atlassian.net" style="font-size:18px;padding:5px 7px" /></div><button class="btn sm primary" onclick="saveJiraSettings()">Save</button><div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)"><div style="font-size:19px;font-weight:600;color:var(--text);margin-bottom:6px">Bookmarklet</div><div style="font-size:18px;color:var(--text3);margin-bottom:8px">Drag this to your bookmarks bar. Click it on any Jira ticket to push it straight into this board.</div><a id="bookmarklet-link" href="#" style="display:inline-flex;align-items:center;gap:5px;padding:5px 10px;background:#eeedfe;color:#26215c;border:1px solid #534ab7;border-radius:5px;font-size:19px;font-weight:600;text-decoration:none;cursor:grab" draggable="true"><i class="ti ti-bookmark" style="font-size:19px"></i> Send to Board </a><div style="font-size:18px;color:var(--text3);margin-top:6px">Or <button onclick="copyBookmarklet()" style="background:none;border:none;color:#534ab7;font-size:18px;cursor:pointer;padding:0;font-weight:600">copy the code</button> and create a bookmark manually.</div><div id="bookmarklet-copied" style="font-size:18px;color:#1d9e75;margin-top:4px;display:none">✓ Copied!</div></div></div></div><button class="btn primary" id="btn-add-theme" onclick="openThemeModal()"><i class="ti ti-plus" aria-hidden="true"></i> Add theme</button><button class="btn primary" id="btn-add-ticket" onclick="openTicketModal()" style="display:none"><i class="ti ti-plus" aria-hidden="true"></i> Add ticket</button></div></header><nav class="tabs"><button class="tab-btn active" id="tab-plan" onclick="switchTab('plan')"><i class="ti ti-layout-grid" aria-hidden="true"></i> Before 1 Jan 2026 <span class="tab-count" id="tc-plan">0</span></button><button class="tab-btn" id="tab-nfy" onclick="switchTab('nfy')"><i class="ti ti-calendar-stats" aria-hidden="true"></i> Next financial year <span class="tab-count" id="tc-nfy">0</span></button><button class="tab-btn" id="tab-progress" onclick="switchTab('progress')"><i class="ti ti-loader" aria-hidden="true"></i> In progress <span class="tab-count" id="tc-progress">0</span></button></nav><div class="panel active" id="panel-plan"><div class="sprint-nav" id="nav-plan"></div><div class="grid-wrap"><div class="timeline-grid" id="tl-plan"></div></div><div id="detail-plan"></div></div><div class="panel" id="panel-nfy"><div class="sprint-nav" id="nav-nfy"></div><div class="grid-wrap"><div class="timeline-grid" id="tl-nfy"></div></div><div id="detail-nfy"></div></div><div class="panel" id="panel-progress"><div class="progress-wrap"><div class="progress-board" id="progress-board"></div></div></div><!-- Theme Modal --><div class="modal-overlay" id="theme-modal" onclick="if(event.target===this)closeThemeModal()"><div class="modal"><h2><span id="theme-modal-title">Add theme</span><button class="icon-btn" onclick="closeThemeModal()" aria-label="Close"><i class="ti ti-x"></i></button></h2><div class="form-group"><label>Theme / goal title</label><input type="text" id="th-title async function sbGet(table) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?select=*`, { headers: SB_HEADERS });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpsert(table, row) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: 'POST', headers: SB_HEADERS, body: JSON.stringify(row)
  });
  if (!r.ok) throw new Error(await r.text());
}
async function sbDelete(table, id) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`, {
    method: 'DELETE', headers: SB_HEADERS
  });
  if (!r.ok) throw new Error(await r.text());
}

async function loadData() {
  try {
    const [thRows, tkRows, metaRows] = await Promise.all([
      sbGet('pb_themes'), sbGet('pb_tickets'), sbGet('pb_meta'),
    ]);
    const newThemes  = thRows.map(r => r.data);
    const newTickets = tkRows.map(r => r.data);
    const newCap  = JSON.parse(metaRows.find(r=>r.key==='cap')?.value  || '{}');
    const newJira = metaRows.find(r=>r.key==='jira')?.value || 'https://dlapiperuk.atlassian.net';
    const hash = JSON.stringify([newThemes, newTickets, newCap, newJira]);
    if (hash !== _lastHash) {
      _lastHash = hash;
      themes = newThemes; tickets = newTickets; capData = newCap; jiraUrl = newJira;
      const ju = document.getElementById('jira-url');
      if (ju) ju.value = jiraUrl;
      render();
    }
  } catch(e) { console.error('Load failed', e); setSyncBadge(false); }
}

function setSyncBadge(ok) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (!dot) return;
  dot.style.background = ok ? '#1d9e75' : '#e24b4a';
  lbl.textContent = ok ? 'Saved' : 'Error saving';
  clearTimeout(window._syncTimer);
  window._syncTimer = setTimeout(() => { dot.style.background='var(--text3)'; lbl.textContent='Live'; }, 2000);
}

async function save() {
  // Bulk save — used for drag-drop etc
  try {
    await Promise.all([
      ...themes.map(t => sbUpsert('pb_themes', {id: t.id, data: t})),
      ...tickets.map(t => sbUpsert('pb_tickets', {id: t.id, data: t})),
    ]);
    _lastHash = JSON.stringify([themes, tickets, capData, jiraUrl]);
    setSyncBadge(true);
  } catch(e) { console.error('Save failed', e); setSyncBadge(false); }
}

async function saveOne(type, item) {

  } catch(e) { console.error('Save failed', e); setSyncBadge(false); }
}

async function deleteOne(type, id) {
  try {
    await sbDelete(type==='theme' ? 'pb_themes' : 'pb_tickets', id);

function renderTimeline(gridId, allSprints, tabKey){
  const grid = document.getElementById(gridId);
  const offset = sprintOffset[tabKey];
  const sprints = allSprints.slice(offset, offset + SPRINT_WINDOW);
  const n = sprints.length;
  const canPrev = offset > 0;
  const canNext = offset + SPRINT_WINDOW < allSprints.length;
  grid.style.gridTemplateColumns = `var(--owner-w) repeat(${n},minmax(160px,1fr))`;

  // Render nav bar above grid
  const navEl = document.getElementById('nav-' + tabKey);
  if(navEl){
    navEl.innerHTML = `
      <button class="sprint-nav-btn" onclick="navSprints('${tabKey}',-1)" ${canPrev?'':'disabled'} title="Previous sprints">&#8249;</button>
      <button class="sprint-nav-btn" onclick="navSprints('${tabKey}',1)" ${canNext?'':'disabled'} title="Next sprints">&#8250;</button>
      <span class="sprint-nav-label">Sprints ${allSprints[offset].num}–${allSprints[Math.min(offset+n-1,allSprints.length-1)].num}</span>
      <span class="sprint-nav-range">(${offset+1}–${offset+n} of ${allSprints.length})</span>
    `;
  }

  const sprintIds = sprints.map(s=>s.id);
  const idxOf = id => sprintIds.indexOf(id);
  let html = '';
  html += `<div class="tl-corner"><span style="font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3)">Themes</span></div>`;

      <div class="tl-sprint-num">${s.num}</div><div class="tl-sprint-dates">${esc(s.label)}</div></div>`;
  });
  OWNERS.forEach((o,oi) => {
    const isLast = oi===OWNERS.length-1;
    const ownerThemes = themes.filter(t => t.owner===o.id && sprintIds.includes(t.startSprint));
    const rowNum = 2+oi;
    html += `<div class="tl-row-head" style="grid-row:${rowNum};grid-column:1;background:${o.head};${isLast?'border-bottom:none;':''}">

      <div class="owner-name" style="color:${o.textColor}">${esc(o.label)}</div></div>`;
    sprints.forEach((s,si) => {
      const col = 2+si;
      const bgColor = si%2===0?o.bg:o.bg2;
      const isLastCol = si===n-1;

        const si0 = idxOf(th.startSprint);
        const si1 = idxOf(th.endSprint);
        if(si1<0 || si<si0 || si>si1) return;
        const tc = THEME_COLORS[th.color]||THEME_COLORS.blue;
        const dark = isDark();
        const bg = dark?tc.dbg:tc.bg;
        const txt = dark?tc.dt:tc.text;
        let cls = 'theme-bar';
        if(si0===si1) cls+=' single';
        else if(si===si0) cls+=' start';
        else if(si===si1) cls+=' end';
        else cls+=' middle';
        const showTitle = si===si0;

    html += `<div class="df-cell">${n}</div>`;
  });
  html += `<div class="df-label">Capacity</div>`;
  SUBCATS.forEach(sc => {
    const ck = `${sid}-${sc.id}`;
    const cv = capData[ck] !== undefined ? capData[ck] : '';
    html += `<div class="df-cell"><input class="cap-input" type="number" min="0" placeholder="—"
      value="${cv}" onchange="setSprintCap('${ck}',this.value)" title="Capacity for ${sc.label}" /></div>`;
  });
  html += `<div class="df-label">Remaining</div>`;
  SUBCATS.forEach(sc => {
    const n = sprintTickets.filter(t=>t.cat===sc.id).length;
    const ck = `${sid}-${sc.id}`;
    const cv = capData[ck] !== undefined ? Number(capData[ck]) : null;
    if(cv===null){ html += `<div class="df-cell df-muted">—</div>`; return; }
    const rem = cv - n;
    const cls = rem < 0 ? 'over-cap' : rem === 0 ? 'at-cap' : 'under-cap';
    html += `<div class="df-cell ${cls}">${rem > 0 ? '+' : ''}${rem}</div>`;
  });
  html += `</div></div>`;
  container.innerHTML = html;
}
function setSprintCap(key, val){
  if(val===''||val===null){delete capData[key];}else{capData[key]=parseInt(val)||0;}
  saveCapData();
  render();
}
function dropTicket(e, newCat, sprintId, el){
  e.preventDefault(); el.style.boxShadow='';
  const tkId = e.dataTransfer.getData('text');
  if(!tkId) return;
  const updated = tickets.map(t=>t.id===tkId?{...t,cat:newCat,sprint:sprintId}:t);
  tickets = updated;
  const moved = tickets.find(t=>t.id===tkId);
  if(moved) saveOne('ticket', moved);
  render();
}
/* ── PROGRESS ── */
function renderProgress(){
  const board=document.getElementById('progress-board');
  let html='';
  OWNERS.forEach(o=>{
    const colTk=tickets.filter(t=>t.owner===o.id&&t.sprint==='progress');
    const colId=`prog-${o.id}`;
    const cards=colTk.length ? colTk.map(tk=>ticketCard(tk)).join('') : `<div class="empty-state">No tickets</div>`;
    html+=`<div class="progress-col"><div class="progress-col-head" style="background:${o.head}">
      <div class="progress-col-title"><div class="owner-avatar" style="background:rgba(255,255,255,.5);color:${o.textColor};width:28px;height:28px;font-size:18px">${o.label.charAt(0)}</div><span style="color:${o.textColor};font-weight:600">${esc(o.label)}</span></div>
      <span style="font-size:18px;color:${o.textColor}">${colTk.length}</span></div>
      <div class="progress-col-body" id="${colId}" style="background:${o.bg}"
        ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')"
        ondrop="event.preventDefault();this.classList.remove('drag-over');const id=event.dataTransfer.getData('text');if(id){tickets=tickets.map(t=>t.id===id?{...t,owner:'${o.id}',sprint:'progress'}:t);const mv=tickets.find(t=>t.id===id);if(mv)saveOne('ticket',mv);render()}">${cards}</div></div>`;

}
function render(){
  renderTimeline('tl-plan',PLAN_SPRINTS,'plan');
  renderTimeline('tl-nfy',NFY_SPRINTS,'nfy');
  renderDetail('detail-plan',PLAN_SPRINTS,'plan');

  updateCounts();
}
/* ── SETTINGS ── */
function toggleSettings(){document.getElementById('settings-pop').classList.toggle('open')}
function ticketCard(tk){
  const jLink = jiraLink(tk);
  const priorityLabel = {
    'must-do':'Must Do','high':'High','medium':'Medium','low':'Low','bau':'BAU'
  }[tk.priority] || tk.priority;
  const LABEL_BG = {
    'Ticket Creation':  {bg:'#fce8e8',border:'#e24b4a',text:'#5c0a0a'},
    'Ready To Refine':  {bg:'#faeeda',border:'#ef9f27',text:'#412402'},
    'Ready for Sprint': {bg:'#eaf3de',border:'#3b6d11',text:'#173404'},
  };
  const REFINEMENT_LABELS = ['Refinement Session 1','Refinement Session 2','Refinement Session 3'];
  const labels = tk.labels ? tk.labels.split(',').map(l=>l.trim()).filter(Boolean) : [];
  const colourLabel = labels.find(l => LABEL_BG[l]);
  const refinementLabel = labels.find(l => REFINEMENT_LABELS.includes(l));
  const cardBg     = colourLabel ? LABEL_BG[colourLabel].bg     : 'var(--surface)';
  const cardBorder = colourLabel ? LABEL_BG[colourLabel].border  : 'var(--border)';
  const cardText   = colourLabel ? LABEL_BG[colourLabel].text    : 'var(--text)';
  const refinementBadge = refinementLabel
    ? `<div style="font-size:11px;font-weight:600;color:var(--text2);margin-top:3px;padding:2px 0">${esc(refinementLabel)}</div>`
    : '';
  const statusBadge   = tk.status  ? `<span style="font-size:11px;font-weight:500;padding:1px 5px;border-radius:3px;background:rgba(0,0,0,0.07);color:${cardText}">${esc(tk.status)}</span>` : '';
  const pointsBadge   = tk.points  ? `<span style="font-size:11px;font-weight:600;padding:1px 5px;border-radius:3px;background:#eeedfe;color:#26215c" title="Story points">${tk.points}pt</span>` : '';
  const goalBadge     = tk.goal    ? `<span class="goal-flag">🎯 Goal</span>` : '';
  const epicBadge     = tk.epicUrl ? `<a href="${tk.epicUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="font-size:11px;color:${cardText};opacity:.7;display:block;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none" title="${esc(tk.epicUrl)}">⬡ Epic</a>` : '';
  const commentsBadge = tk.comments ? `<div style="font-size:12px;color:${cardText};opacity:.8;margin-top:3px;line-height:1.35;font-style:italic">${esc(tk.comments)}</div>` : '';
  return `<div class="ticket" id="card-${tk.id}" draggable="true"
    ondragstart="event.dataTransfer.setData('text','${tk.id}');this.classList.add('dragging')"
    ondragend="this.classList.remove('dragging')"
    style="background:${cardBg};border-color:${cardBorder}">
    <div class="ticket-top">
      <div class="ticket-title" style="color:${cardText}">${esc(tk.title)}</div>
      <div style="display:flex;align-items:center;gap:3px;flex-shrink:0">${goalBadge}${jLink}</div>
    </div>
    ${epicBadge}
    ${refinementBadge}
    ${commentsBadge}
    <div style="display:flex;align-items:center;gap:3px;flex-wrap:wrap;margin-top:4px">
      ${statusBadge}${pointsBadge}
    </div>
    <div class="ticket-footer" style="margin-top:4px">
      <div style="display:flex;align-items:center;gap:4px">
        <span class="priority-dot priority-${tk.priority}" title="${priorityLabel}"></span>
        <span style="font-size:11px;color:${cardText};opacity:.7">${priorityLabel}</span>
      </div>
      <div class="ticket-actions">
        <button class="icon-btn" onclick="editTicket('${tk.id}')" aria-label="Edit"><i class="ti ti-edit"></i></button>
        <button class="icon-btn delete" onclick="deleteTicket('${tk.id}')" aria-label="Delete"><i class="ti ti-trash"></i></button>
      </div>
    </div>
  </div>`;
}
function jiraLink(tk){
  if(!tk.jira) return '';
  const base = jiraUrl || 'https://dlapiperuk.atlassian.net';
  return `<a class="ticket-jira" href="${base}/browse/${tk.jira}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(tk.jira)}</a>`;
}
function saveJiraSettings(){
  jiraUrl = document.getElementById('jira-url').value.replace(/\/$/,'') || 'https://dlapiperuk.atlassian.net';
  // jiraUrl saved via saveJiraUrlShared
  document.getElementById('settings-pop').classList.remove('open');
  render();
}
document.addEventListener('click',e=>{if(!e.target.closest('.settings-wrap'))document.getElementById('settings-pop').classList.remove('open')});
/* ── POPULATE SPRINT SELECTS ── */
function popSprintOpts(selId, selected, includeProgress){
  const sel=document.getElementById(selId);
  let html=includeProgress?'<option value="progress">In progress</option>':'';
  html+=`<optgroup label="Before 1 Jan 2026">`;
  PLAN_SPRINTS.forEach(s=>{html+=`<option value="${s.id}"${s.id===selected?' selected':''}>Sprint ${s.num} (${s.label})</option>`});
  html+=`</optgroup><optgroup label="Next financial year">`;
  NFY_SPRINTS.forEach(s=>{html+=`<option value="${s.id}"${s.id===selected?' selected':''}>Sprint ${s.num} (${s.label})</option>`});
  html+=`</optgroup>`;
  sel.innerHTML=html;
}
/* ── THEME MODAL ── */
function openThemeModal(owner,start,end){
  editingThemeId=null;
  document.getElementById('theme-modal-title').textContent='Add theme';
  document.getElementById('th-title').value='';
  document.getElementById('th-desc').value='';
  document.getElementById('th-owner').value=owner||'george';
  document.getElementById('th-priority').value='medium';
  document.getElementById('th-color').value='blue';

  popSprintOpts('th-start',start||defSprint,false);
  popSprintOpts('th-end',end||start||defSprint,false);
  document.getElementById('theme-modal').classList.add('open');
  setTimeout(()=>document.getElementById('th-title').focus(),50);
}
function editTheme(id){
  const t=themes.find(x=>x.id===id);if(!t)return;
  editingThemeId=id;
  document.getElementById('theme-modal-title').textContent='Edit theme';
  document.getElementById('th-title').value=t.title;
  document.getElementById('th-desc').value=t.desc||'';
  document.getElementById('th-owner').value=t.owner;
  document.getElementById('th-priority').value=t.priority;

function deleteTheme(id){themes=themes.filter(t=>t.id!==id);deleteOne('theme',id);render()}
function closeThemeModal(){document.getElementById('theme-modal').classList.remove('open')}
function saveTheme(){
  const title=document.getElementById('th-title').value.trim();
  if(!title){document.getElementById('th-title').style.borderColor='#e24b4a';return}
  document.getElementById('th-title').style.borderColor='';
  const obj={id:editingThemeId||Date.now().toString(),title,desc:document.getElementById('th-desc').value.trim(),
    owner:document.getElementById('th-owner').value,startSprint:document.getElementById('th-start').value,
    endSprint:document.getElementById('th-end').value,priority:document.getElementById('th-priority').value,
    color:document.getElementById('th-color').value};
  themes=editingThemeId?themes.map(t=>t.id===editingThemeId?obj:t):[...themes,obj];
  saveOne('theme',obj);closeThemeModal();render();
}
/* ── TICKET MODAL ── */
function openTicketModal(owner,sprint,cat){
  editingTicketId=null;
  document.getElementById('ticket-modal-title').textContent='Add ticket';
  document.getElementById('tk-title').value='';
  document.getElementById('tk-jira').value='';
  document.getElementById('tk-status').value='';
  document.getElementById('tk-points').value='';
  document.getElementById('tk-epic-url').value='';
  document.getElementById('tk-labels').value='';

  document.getElementById('tk-owner').value=owner||'george';
  document.getElementById('tk-priority').value='medium';

  populateThemeSelect();
  document.getElementById('ticket-modal').classList.add('open');

}
function editTicket(id){
  const t=tickets.find(x=>x.id===id);if(!t)return;
  editingTicketId=id;
  document.getElementById('ticket-modal-title').textContent='Edit ticket';
  document.getElementById('tk-title').value=t.title;
  document.getElementById('tk-jira').value=t.jira||'';
  document.getElementById('tk-status').value=t.status||'';
  document.getElementById('tk-points').value=t.points||'';
  document.getElementById('tk-epic-url').value=t.epicUrl||'';
  document.getElementById('tk-labels').value=t.labels||'';
  setMultiSelectValues('tk-labels-wrap','tk-labels','tk-labels-display',t.labels||'');
  document.getElementById('tk-comments').value=t.comments||'';
  document.getElementById('tk-goal').checked=!!t.goal;
  document.getElementById('jira-fetch-status').textContent='';
  document.getElementById('tk-cat').value=t.cat;
  document.getElementById('tk-owner').value=t.owner;
  document.getElementById('tk-priority').value=t.priority||'medium';
  popSprintOpts('tk-sprint',t.sprint,true);
  populateThemeSelect(t.themeId);

function populateThemeSelect(sel){
  const s=document.getElementById('tk-theme');
  let html='<option value="">None</option>';
  themes.forEach(t=>{html+=`<option value="${t.id}"${t.id===sel?' selected':''}>${esc(t.title)} (${esc(t.owner)})</option>`});
  s.innerHTML=html;
}
function deleteTicket(id){tickets=tickets.filter(t=>t.id!==id);deleteOne('ticket',id);render()}
function closeTicketModal(){document.getElementById('ticket-modal').classList.remove('open')}
/* ── MULTI-SELECT ── */
function toggleMultiSelect(wrapId){
  const dd = document.getElementById(wrapId).querySelector('.ms-dropdown');
  const isOpen = dd.classList.contains('open');
  document.querySelectorAll('.ms-dropdown.open').forEach(d => d.classList.remove('open'));
  if(!isOpen) dd.classList.add('open');
}
function syncMultiSelect(wrapId, hiddenId, displayId){
  const wrap = document.getElementById(wrapId);
  const checked = Array.from(wrap.querySelectorAll('input[type=checkbox]:checked')).map(cb => cb.value);
  document.getElementById(hiddenId).value = checked.join(',');
  const disp = document.getElementById(displayId);
  if(checked.length === 0){ disp.textContent = 'Select labels…'; disp.classList.add('placeholder'); }
  else { disp.textContent = checked.join(', '); disp.classList.remove('placeholder'); }
}
function setMultiSelectValues(wrapId, hiddenId, displayId, valuesStr){
  const values = valuesStr ? valuesStr.split(',').map(v=>v.trim()).filter(Boolean) : [];
  const wrap = document.getElementById(wrapId);
  wrap.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.checked = values.includes(cb.value);
  });
  syncMultiSelect(wrapId, hiddenId, displayId);
}
document.addEventListener('click', e => {
  if(!e.target.closest('.multi-select')){
    document.querySelectorAll('.ms-dropdown.open').forEach(d => d.classList.remove('open'));
  }
});
function saveTicket(){
  const title=document.getElementById('tk-title').value.trim();
  if(!title){document.getElementById('tk-title').style.borderColor='#e24b4a';return}
  document.getElementById('tk-title').style.borderColor='';
  const obj={
    id:       editingTicketId||Date.now().toString(),
    title,
    jira:     document.getElementById('tk-jira').value.trim(),
    status:   document.getElementById('tk-status').value.trim(),
    points:   document.getElementById('tk-points').value.trim(),
    epicUrl:  document.getElementById('tk-epic-url').value.trim(),
    labels:   document.getElementById('tk-labels').value.trim(),
    comments: document.getElementById('tk-comments').value.trim(),
    goal:     document.getElementById('tk-goal').checked,
    cat:      document.getElementById('tk-cat').value,
    owner:    document.getElementById('tk-owner').value,
    priority: document.getElementById('tk-priority').value,
    sprint:   document.getElementById('tk-sprint').value,
    themeId:  document.getElementById('tk-theme').value||null
  };
  tickets=editingTicketId?tickets.map(t=>t.id===editingTicketId?obj:t):[...tickets,obj];
  saveOne('ticket',obj);closeTicketModal();render();
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeThemeModal();closeTicketModal()}});
(function checkUrlParams(){
  const p = new URLSearchParams(window.location.search);
  if(!p.get('bm')) return;
  setTimeout(() => {
    openTicketModal(null, null, null);
    if(p.get('key'))    document.getElementById('tk-jira').value   = p.get('key');
    if(p.get('title'))  document.getElementById('tk-title').value  = p.get('title');
    if(p.get('status')) document.getElementById('tk-status').value = p.get('status');
    if(p.get('points')) document.getElementById('tk-points').value = p.get('points');
    if(p.get('epic'))   document.getElementById('tk-epic-url').value = p.get('epic');
    if(p.get('labels')) document.getElementById('tk-labels').value = p.get('labels');
    if(p.get('priority')){
      const pr = p.get('priority').toLowerCase();
      document.getElementById('tk-priority').value =
        (pr.includes('high')||pr.includes('critical')||pr.includes('blocker')) ? 'high' :
        (pr.includes('low')||pr.includes('minor')||pr.includes('trivial'))     ? 'low'  : 'medium';
    }
    document.getElementById('jira-fetch-status').style.color = '#1d9e75';
    document.getElementById('jira-fetch-status').textContent = '\u2713 Imported from Jira \u2014 pick a sprint, category and owner then save';
    window.history.replaceState({}, '', window.location.pathname);
  }, 300);
})();

(function buildBookmarklet(){
  const boardUrl = window.location.href.split('?')[0];
  const code = `(function(){
  try{
    var key='',title='',status='',priority='',points='',epic='',labels='';
    var m=location.pathname.match(/\\/browse\\/([A-Z]+-\\d+)/);
    if(m) key=m[1];
    var t=document.querySelector('[data-testid="issue.views.issue-base.foundation.summary.heading"]')||
          document.querySelector('[data-testid*="summary"] h1')||
          document.querySelector('h1[class*="summary"]')||
          document.querySelector('h1');
    if(t) title=t.innerText.trim();
    var s=document.querySelector('[data-testid*="status"] button')||
          document.querySelector('[class*="status-lozenge"]')||
          document.querySelector('#status-val');
    if(s) status=s.innerText.trim();
    var pr=document.querySelector('[data-testid*="priority"] img')||
           document.querySelector('[aria-label*="priority" i]')||
           document.querySelector('#priority-val');
    if(pr) priority=pr.alt||pr.getAttribute('aria-label')||pr.innerText||'';
    var sp=document.querySelector('[data-testid*="story_points"] [class*="value"]')||
           document.querySelector('[data-testid*="customfield_10016"] [class*="value"]')||
           document.querySelector('[data-testid*="storyPoints"] span');
    if(sp) points=sp.innerText.trim();
    var ep=document.querySelector('[data-testid*="epic"] a')||
           document.querySelector('[data-testid*="parent"] a')||
           document.querySelector('#customfield_10014-val a');
    if(ep) epic=ep.innerText.trim();
    var lb=document.querySelectorAll('[data-testid*="labels"] a,[data-testid*="labels"] span[class*="tag"],#labels-val .lozenge');
    if(lb.length) labels=Array.from(lb).map(function(l){return l.innerText.trim();}).filter(Boolean).join(',');
    if(!key){alert('No Jira ticket key found. Make sure you have a ticket open (the URL should contain /browse/KEY-123).');return;}
    var url='` + boardUrl + `?bm=1&key='+encodeURIComponent(key)+'&title='+encodeURIComponent(title)+'&status='+encodeURIComponent(status)+'&priority='+encodeURIComponent(priority)+'&points='+encodeURIComponent(points)+'&epic='+encodeURIComponent(epic)+'&labels='+encodeURIComponent(labels);
    window.open(url,'_blank');
  }catch(e){alert('Bookmarklet error: '+e.message);}
})();`;
  const href = 'javascript:' + encodeURIComponent(code);
  const link = document.getElementById('bookmarklet-link');
  if(link) link.href = href;
})();
function copyBookmarklet(){
  const link = document.getElementById('bookmarklet-link');
  navigator.clipboard.writeText(link.href).then(()=>{
    const el = document.getElementById('bookmarklet-copied');
    el.style.display='block';
    setTimeout(()=>el.style.display='none', 2000);
  });
}
